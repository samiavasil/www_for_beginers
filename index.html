    <!DOCTYPE html>
    <html lang="bg">
        <head>
            <meta charset="UTF-8">
            <title>Моят първи уеб сайт</title>
            <style>
                body {
                    margin: 0;
                    display: flex;
                    height: 100vh;
                    font-family: sans-serif;
                }
                nav {
                    width: 220px;
                    background: #34495e;
                    color: #fff;
                    padding: 20px;
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                    box-shadow: 2px 0 8px rgba(0,0,0,0.08);
                }
                nav h2 {
                    margin-top: 0;
                    margin-bottom: 20px;
                    font-size: 1.3em;
                }
                nav a {
                    color: #fff;
                    text-decoration: none;
                    padding: 8px 0;
                    font-size: 1.1em;
                    transition: color 0.2s;
                }
                nav a:hover {
                    color: #f1c40f;
                }
                main {
                    flex-grow: 1;
                    padding: 32px;
                    background: #f8f9fa;
                    color: #222;
                    min-width: 0;
                }
            </style>
        </head>
        <body>
            <nav>
                <h2>Меню</h2>
                <a href="#">Начало</a>
                <a href="#">За нас</a>
                <a href="#">Услуги</a>
                <a href="#">Контакти</a>
                <button id="showMsgBtn" style="margin-top:20px;">Покажи съобщение</button>
            </nav>
            <main>
                <h1>Добре дошли!</h1>
                <p>Това е централното съдържание.</p>
            </main>
                <script>
                    // Взимаме бутона и централния панел
                    const btn = document.getElementById('showMsgBtn');
                    const main = document.querySelector('main');

                    // Когато бутонът се натисне, сменяме съдържанието
                    btn.addEventListener('click', function() {
                        main.innerHTML = '<h1>Съобщение!</h1><p>Това е динамично съдържание, показано с JavaScript.</p>';
                    });
                </script>
        </body>
        </html>
