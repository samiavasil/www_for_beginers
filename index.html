    <!DOCTYPE html>
    <html lang="bg">
        <head>
            <meta charset="UTF-8">
            <title>Моят първи уеб сайт</title>
            <style>
                body {
                    margin: 0;
                    display: flex;
                    height: 100vh;
                    font-family: sans-serif;
                }
                nav {
                    width: 220px;
                    background: #34495e;
                    color: #fff;
                    padding: 20px;
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                    box-shadow: 2px 0 8px rgba(0,0,0,0.08);
                }
                nav h2 {
                    margin-top: 0;
                    margin-bottom: 20px;
                    font-size: 1.3em;
                }
                nav a {
                    color: #fff;
                    text-decoration: none;
                    padding: 8px 0;
                    font-size: 1.1em;
                    transition: color 0.2s;
                }
                nav a:hover {
                    color: #f1c40f;
                }
                main {
                    flex-grow: 1;
                    padding: 32px;
                    background: #f8f9fa;
                    color: #222;
                    min-width: 0;
                }
            </style>
        </head>
        <body>
            <nav>
                <h2>Меню</h2>
                    <a href="#" id="nav-home">Начало</a>
                    <a href="#" id="nav-form">Формуляр</a>
                    <a href="#" id="nav-profile">Профил</a>
                    <a href="#" id="nav-msg">Съобщение</a>
            </nav>
            <main>
                <div id="main-content"></div>
            </main>
                <script>
                    // ...existing code...
                    // Навигация и динамични вюта
                    const mainContent = document.getElementById('main-content');
                    function showHome() {
                        mainContent.innerHTML = '<h1>Добре дошли!</h1><p>Това е централното съдържание.</p>';
                    }
                    function showForm() {
                        mainContent.innerHTML = `
                            <h2>Формуляр</h2>
                            <form id="myForm" style="margin-top:30px;">
                                <input type="text" id="name" placeholder="Име" required>
                                <button type="submit">Изпрати</button>
                            </form>
                            <div id="result"></div>
                        `;
                        const form = document.getElementById('myForm');
                        const result = document.getElementById('result');
                        if(form) {
                            form.addEventListener('submit', function(e) {
                                e.preventDefault();
                                const name = document.getElementById('name').value;
                                if(name.length < 2) {
                                    result.innerHTML = 'Името трябва да е поне 2 символа!';
                                } else {
                                    result.innerHTML = 'Успешно изпратено: ' + name;
                                }
                            });
                        }
                    }
                    function showProfile() {
                        mainContent.innerHTML = `
                            <section class="userCard" style="border:1px solid #ccc; padding:16px; border-radius:8px; max-width:300px; background:#fff; margin-top:20px;">
                                <h2>Потребител</h2>
                                <p>Име: Иван</p>
                                <button onclick="alert('Профилът на Иван')">Покажи профил</button>
                            </section>
                        `;
                    }
                    function showMsg() {
                        mainContent.innerHTML = '<h2>Съобщение</h2><p>Това е динамично съдържание, показано с JavaScript.</p>';
                    }
                    // Навигационни бутони
                    document.getElementById('nav-home').addEventListener('click', function(e) { e.preventDefault(); showHome(); });
                    document.getElementById('nav-form').addEventListener('click', function(e) { e.preventDefault(); showForm(); });
                    document.getElementById('nav-profile').addEventListener('click', function(e) { e.preventDefault(); showProfile(); });
                    document.getElementById('nav-msg').addEventListener('click', function(e) { e.preventDefault(); showMsg(); });
                    // Показваме началното съдържание
                    showHome();
                </script>
        </body>
        </html>
